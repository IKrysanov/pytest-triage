name: DCO

# Require a Signed-off-by trailer on every commit in a PR (git commit -s).
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: dco-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dco-check:
    name: Check Signed-off-by on all commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR commits
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          for sha in $(git rev-list "${BASE_SHA}..${HEAD_SHA}"); do
            author_email="$(git show -s --format='%ae' "$sha")"
            subject="$(git show -s --format='%s' "$sha")"
            case "$author_email" in
              *"[bot]@users.noreply.github.com")
                echo "Skipping bot commit ${sha} (\"${subject}\")."
                continue
                ;;
            esac
            if ! git show -s --format='%B' "$sha" \
                 | grep -qiE "^Signed-off-by: .+ <.+@.+>"; then
              echo "::error::Commit ${sha} (\"${subject}\") is missing a Signed-off-by line."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Fix with: git rebase --signoff ${BASE_SHA} && git push --force-with-lease"
            echo "See CONTRIBUTING.md (DCO)."
            exit 1
          fi
          echo "All commits are signed off."

name: Release

# Publishes to PyPI on a published GitHub Release, and attaches the same dists
# plus a Sigstore attestation to that Release. Build once; publish and attest
# consume that single artifact, so the attached bundle covers the exact bytes
# on PyPI. Trusted Publishing (OIDC) is configured on PyPI: project
# pytest-triage, repo IKrysanov/pytest-triage, workflow release.yml, env pypi.
# Flow: bump version in pyproject.toml -> tag vX.Y.Z -> publish a GitHub Release.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --require-hashes -r requirements/build.txt
      - name: Build sdist and wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject version: ${PKG_VERSION}, tag: ${TAG}"
          if [ "${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject version ${PKG_VERSION}"
            exit 1
          fi
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pytest-triage/
    permissions:
      id-token: write   # mint the OIDC token for Trusted Publishing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1

  attest-and-attach:
    name: Sign distributions and attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # Sigstore signing identity
      attestations: write    # persist the attestation
      contents: write        # attach assets to the Release
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Generate Sigstore attestation for the distributions
        id: attest
        # Attests the same bytes publish-pypi uploads (same build artifact).
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: "dist/*"
      - name: Assemble release assets
        # *.intoto.jsonl is the extension Scorecard's Signed-Releases recognises.
        run: |
          set -euo pipefail
          mkdir -p signed
          cp dist/* signed/
          BUNDLE="${{ steps.attest.outputs.bundle-path }}"
          if [ -n "${BUNDLE}" ] && [ -f "${BUNDLE}" ]; then
            cp "${BUNDLE}" "signed/pytest-triage-${GITHUB_REF_NAME#v}.intoto.jsonl"
          else
            echo "::error::Attestation bundle path not found: '${BUNDLE}'"
            exit 1
          fi
          ls -la signed/
      - name: Attach assets to the GitHub Release
        run: gh release upload "${GITHUB_REF_NAME}" signed/* --repo "${GITHUB_REPOSITORY}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

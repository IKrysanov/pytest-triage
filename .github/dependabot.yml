# Weekly dependency updates. Actions are SHA-pinned; Dependabot bumps the hash
# and the trailing version comment together (Scorecard Dependency-Update-Tool).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]

  # Runtime + dev deps declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  # Hash-pinned CI locks (regenerate with the uv command in CONTRIBUTING.md).
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
